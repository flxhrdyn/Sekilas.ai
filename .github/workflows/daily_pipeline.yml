name: Sekilas.ai Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # 07:00 WIB
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('backend/config/settings.py') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Orchestrate Sekilas.ai Agentic Pipeline
        run: python -m backend.pipeline.orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ vars.QDRANT_COLLECTION }}
          # Elite Model Config
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'sentence-transformers/all-MiniLM-L6-v2' }}
          EMBEDDING_OUTPUT_DIM: ${{ vars.EMBEDDING_OUTPUT_DIM || '384' }}
          CLASSIFIER_MODEL: ${{ vars.CLASSIFIER_MODEL || 'models/gemini-2.0-flash-lite-preview' }}
          SUMMARIZER_MODEL: ${{ vars.SUMMARIZER_MODEL || 'models/gemini-2.0-flash-lite-preview' }}
          HF_HOME: .cache/huggingface
          # Truth-Driven Thresholds
          DEDUP_THRESHOLD: ${{ vars.DEDUP_THRESHOLD || '0.92' }}
          MIN_CONTENT_CHARS: ${{ vars.MIN_CONTENT_CHARS || '200' }}
          SUMMARY_MAX_CONTENT_CHARS: ${{ vars.SUMMARY_MAX_CONTENT_CHARS || '3000' }}
          REQUEST_TIMEOUT_SECONDS: ${{ vars.REQUEST_TIMEOUT_SECONDS || '20' }}
          USER_AGENT: ${{ vars.USER_AGENT || 'sekilas-ai-agentic-rag/0.1 (+https://github.com)' }}
          # Orchestration Status
          ENABLE_TELEGRAM_NOTIFY: ${{ vars.ENABLE_TELEGRAM_NOTIFY || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL || '' }}

      - name: Verify Intelligence Growth
        run: |
          echo "Pipeline Completed. Checking Data pulse..."
          python -c "import json; d=json.load(open('data/summaries.json')); print(f'Total Stories: {len(d)} | Latest Headline: {d[-1][\"headline\"]}')"

      - name: Commit updated data files
        run: |
          git config user.name "Sekilas.ai Bot"
          git config user.email "bot@sekilas.ai"
          git add -f data/summaries.json data/processed_urls.txt
          git diff --staged --quiet || git commit -m "chore: daily sekilas.ai update"
          git push
